<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>帳號管理 | BLE Mesh</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* 引用與 sensors.html 類似的共用樣式 */
    :root { --bg-main: #eef2f6; --text-main: #1e293b; --primary: #0f172a; }
    body { margin: 0; font-family: system-ui; background: var(--bg-main); color: var(--text-main); }
    .layout { display: grid; grid-template-columns: 250px 1fr; min-height: 100vh; max-width: 1440px; margin: 0 auto; background: rgba(255,255,255,0.5); }
    .sidebar { background: #fff; padding: 32px 24px; }
    .brand { font-size: 32px; font-weight: 800; }
    .menu { display: flex; flex-direction: column; gap: 8px; margin-top: 40px; }
    .menu-item { text-decoration: none; color: #475569; padding: 12px 16px; border-radius: 12px; font-weight: 600; }
    .menu-item:hover { background: var(--primary); color: #fff; }
    .main { padding: 40px; }
    
    /* 列表樣式 */
    .user-list { background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .user-row { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid #e2e8f0; }
    .user-row:last-child { border-bottom: none; }
    .role-badge { font-size: 12px; background: #e2e8f0; padding: 4px 8px; border-radius: 4px; margin-left: 8px; }
    .btn-del { background: #ef4444; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
    .btn-del:hover { background: #dc2626; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">BLE Mesh</div>
      <div class="menu">
        <a class="menu-item" href="index.html">返回主畫面</a>
        <div style="margin-top:20px; font-size:12px; color:#94a3b8;">管理員功能</div>
        <a class="menu-item active" href="#">帳號管理</a>
      </div>
    </aside>

    <main class="main">
      <h2>系統使用者列表</h2>
      <div class="user-list" id="user-list">
        <div>載入中...</div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    async function loadUsers() {
        const list = document.getElementById("user-list");
        try {
            // 需要後端支援這個 API，若無則會報錯
            const res = await fetch(`${API_BASE}/api/users`); 
            if(!res.ok) throw new Error("權限不足或 API 不存在");
            const users = await res.json();
            
            list.innerHTML = "";
            users.forEach(u => {
                const row = document.createElement("div");
                row.className = "user-row";
                const isMe = u.username === localStorage.getItem("username");
                
                row.innerHTML = `
                    <div>
                        <strong>${u.username}</strong>
                        <span class="role-badge">${u.role}</span>
                    </div>
                    ${!isMe ? `<button class="btn-del" onclick="deleteUser('${u.username}')">刪除</button>` : ''}
                `;
                list.appendChild(row);
            });
        } catch(e) {
            list.innerHTML = `<div style="color:red">無法載入列表 (請確認您是管理員)</div>`;
        }
    }

    async function deleteUser(username) {
        if(!confirm(`確定要刪除 ${username}?`)) return;
        try {
            await fetch(`${API_BASE}/api/users/${username}`, { method: "DELETE" });
            loadUsers();
        } catch(e) { alert("刪除失敗"); }
    }

    // 檢查權限
    if(localStorage.getItem("role") !== "admin") {
        alert("權限不足，將返回首頁");
        location.href = "index.html";
    } else {
        loadUsers();
    }
  </script>
</body>
</html>
