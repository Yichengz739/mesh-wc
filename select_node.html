<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>選擇廁所 | BLE Mesh</title>

  <style>
    :root {
      --bg-main: #eef2f6; --bg-panel: #ffffff; 
      --text-main: #1e293b; --text-muted: #64748b;
      --border-light: #e2e8f0;
    }
    * { box-sizing: border-box; }
    
    /* 這是修正後與 index.html 一致的滿版設定 */
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
    }
    
    .dashboard-layout {
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr);
      height: 100vh;                 /* 鋪滿 100% 視窗高度 */
      max-width: 1440px;             /* 對齊 index.html 的 max-width */
      margin: 0 auto;                /* 移除上下 18px 的留白，緊貼邊界 */
      background: rgba(255,255,255,0.5);
      box-shadow: 0 0 50px rgba(0,0,0,0.05);
      overflow: hidden;              /* 移除圓角 border-radius 設定 */
    }
    
    /* Sidebar 風格統一 */
    .sidebar {
      background: #fff;
      border-right: 1px solid var(--border-light);
      padding: 32px 24px;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    .brand { font-size: 32px; font-weight: 800; color: #0f172a; letter-spacing: -0.02em; line-height: 1; }
    .brand-sub { font-size: 12px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); margin-top: 8px; font-weight: 600; }

    .menu { display: flex; flex-direction: column; gap: 8px; margin-top: 40px; }
    .menu-item {
      text-decoration: none; color: #475569; display: flex; align-items: center; gap: 12px;
      font-size: 18px; font-weight: 600; padding: 12px 16px; border-radius: 12px; transition: all 0.2s ease;
    }
    .menu-item:hover { background: #f1f5f9; color: #0f172a; }
    .menu-item.active { background: #0f172a; color: #fff; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.3); }

    .logout-divider { border-top: 1px solid var(--border-light); margin-bottom: 24px; }
    .logout { font-size: 18px; font-weight: 700; color: #ef4444; cursor: pointer; padding: 8px 16px; border-radius: 8px; transition: 0.2s; display: inline-block; }
    .logout:hover { background: #fef2f2; }

    /* User Profile 樣式 (配合 app.js) */
    .user-profile {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px; margin-bottom: 12px;
      background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0;
    }
    .user-icon { width: 36px; height: 36px; background: #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .user-text { display: flex; flex-direction: column; }
    .user-name { font-size: 14px; font-weight: 700; color: #0f172a; }
    .badge-admin { font-size: 10px; background: #0f172a; color: #fff; padding: 1px 6px; border-radius: 4px; font-weight: 600; margin-top: 2px; width: fit-content; }


    .main { 
      background: transparent; 
      padding: 20px 24px; 
      display: flex; flex-direction: column; height: 100%; overflow: hidden; 
    }
    h2 { margin: 0; font-size: 28px; font-weight: 800; color: #0f172a; letter-spacing: -0.02em; flex-shrink: 0; }
    .muted { color: var(--text-muted); font-size: 13px; margin-top: 6px; margin-bottom: 12px; flex-shrink: 0; font-weight: 500; }
    
    /* 地圖卡片風格 */
    .map-card {
      background: #fff;
      border: 1px solid var(--border-light);
      border-radius: 20px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
      flex: 1; min-height: 0;
      position: relative; overflow: hidden;
      display: flex; justify-content: center; align-items: center;
    }

    .map { width: 100%; height: 100%; display: block; object-fit: contain; }

    .tap-area { cursor: pointer; transition: all 0.2s ease; }
    .tap-area:hover circle.base { stroke-width: 4px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2)); }
    .tap-area:hover text { fill: #000; font-weight: 900; }

    /* Tooltip 維持原本美化的白底樣式 */
    .map-tooltip {
      position: absolute; display: none; width: 280px; border-radius: 16px;
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px);
      color: #334155; 
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      border: 1px solid #e2e8f0; pointer-events: none; z-index: 50; overflow: hidden;
    }
    .t-header { padding: 12px 16px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
    .t-title { font-weight: 800; font-size: 15px; color: #0f172a; letter-spacing: 0.02em; }
    .t-icon { font-size: 14px; color: #64748b; }
    .t-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #e2e8f0; margin-bottom: 0; }
    .t-stat { background: #fff; padding: 12px; text-align: center; display: flex; flex-direction: column; gap: 2px; }
    .t-stat-val { font-size: 20px; font-weight: 800; color: #0f172a; line-height: 1.2; }
    .t-stat-label { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .t-unit { font-size: 12px; color: #94a3b8; font-weight: normal; margin-left: 2px;}
    .t-footer { padding: 12px 16px; border-top: 1px solid #e2e8f0; background: #fff; }
    .t-status-title { font-size: 11px; color: #94a3b8; font-weight: 700; margin-bottom: 6px; text-transform: uppercase; }
    .t-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .t-tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
    .t-tag.good { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
    .t-tag.warn { background: #fefce8; color: #ca8a04; border: 1px solid #fde047; }
    .t-tag.bad  { background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; }

    @media (max-width: 900px){
      .dashboard-layout{ grid-template-columns: 1fr; margin:0; border-radius:0; height: 100vh; }
      .sidebar{ border-inline-end:none; border-block-end: 3px solid var(--border-light); height: auto; flex-shrink: 0; }
      .map-card { flex: 1; }
    }
  </style>
</head>

<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <div>
        <div>
          <div class="brand">BLE Mesh</div>
          <div class="brand-sub">smart restroom monitor</div>
        </div>
        <div class="menu">
          <a class="menu-item active" href="./select_node.html">主畫面</a>
          <a class="menu-item" href="./index.html">即時狀況</a>
          <a class="menu-item" href="./sensors.html">感測器</a>
          <a class="menu-item" href="./history.html">歷史紀錄</a>
          <a class="menu-item" href="./realtime_status.html">占用偵測</a>
        </div>
      </div>
      <div>
        <div class="logout-divider"></div>
        <div class="logout">登出</div>
      </div>
    </aside>

    <main class="main">
      <h2>選擇廁所</h2>
      <div class="muted">請點選平面圖中的廁所區域 (Restroom) 以查看詳細資訊。</div>

      <div class="map-card">
        <svg class="map" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
              <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f0f0f0" stroke-width="1"/>
            </pattern>
          </defs>
          <rect width="100%" height="100%" fill="url(#grid)" />
          <path d="M50,100 L300,50 L950,50 L950,650 L650,650 L600,600 L100,600 L50,100 Z" 
                fill="#fdfbf7" stroke="#64748b" stroke-width="3" />
          <g fill="#e0f2fe" stroke="#94a3b8" stroke-width="1">
            <path d="M320,70 L450,70 L450,180 L320,200 Z" />
            <rect x="460" y="70" width="140" height="110" />
            <rect x="610" y="70" width="140" height="110" />
            <path d="M760,70 L930,70 L930,250 L760,250 Z" /> 
            <path d="M70,120 L250,90 L280,250 L100,280 Z" />
            <path d="M110,300 L290,270 L320,400 L140,430 Z" />
            <path d="M400,280 L650,280 L650,380 L400,380 Z" />
            <rect x="760" y="450" width="170" height="130" />
          </g>
          <g font-size="10" fill="#94a3b8" text-anchor="middle" font-family="Arial, sans-serif">
            <text x="385" y="130">40270</text>
            <text x="530" y="130">40280</text>
            <text x="680" y="130">40300</text>
            <text x="845" y="160" font-size="14" font-weight="bold">STORE A</text>
            <text x="180" y="180">40240</text>
            <text x="210" y="350">40210</text>
            <text x="525" y="335" font-size="14" font-weight="bold">INFO CENTER</text>
          </g>
          <g id="restroom-1" class="tap-area">
            <path d="M150,450 L340,420 L360,580 L170,580 Z" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" />
            <circle class="base" cx="255" cy="500" r="25" fill="#3b82f6" stroke="#fff" stroke-width="2" />
            <text x="255" y="508" font-size="20" text-anchor="middle" fill="#fff">🚻</text>
            <rect x="215" y="535" width="80" height="24" rx="12" fill="#1e3a8a" opacity="0.9" />
            <text x="255" y="551" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">廁所 01</text>
          </g>
          <g id="restroom-2" class="tap-area">
            <rect x="670" y="280" width="160" height="120" fill="#fff7ed" stroke="#f97316" stroke-width="2" />
            <circle class="base" cx="750" cy="340" r="25" fill="#f97316" stroke="#fff" stroke-width="2" />
            <text x="750" y="348" font-size="20" text-anchor="middle" fill="#fff">🚻</text>
            <rect x="710" y="375" width="80" height="24" rx="12" fill="#9a3412" opacity="0.9" />
            <text x="750" y="391" font-size="12" fill="#fff" text-anchor="middle" font-weight="700">廁所 02</text>
          </g>
        </svg>
        <div id="map-tooltip" class="map-tooltip"></div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
  
  <script>
  // ============================================
  // ★ 核心邏輯：地圖互動與數據更新
  // ============================================
  
  const SENSOR_LABEL = { temp: "溫度", hum: "濕度", mq135: "氣味", liquid: "洗手液", dist: "衛生紙" };

  // 1. 判斷各數值是否正常 (更新 dist 邏輯)
  function judgeLevel(key, value) {
    const v = Number(value);
    if (!Number.isFinite(v)) return null;
    
    if (key === "temp") {
      if (v >= 30) return { level: "bad", msg: `過高 (${v}°C)` };
      if (v >= 28) return { level: "warn", msg: `偏高 (${v}°C)` };
      return { level: "good", msg: `正常` };
    }
    if (key === "hum") {
      if (v >= 80) return { level: "bad", msg: `過高 (${v}%)` };
      if (v >= 70) return { level: "warn", msg: `偏高 (${v}%)` };
      if (v <= 35) return { level: "warn", msg: `偏低 (${v}%)` };
      return { level: "good", msg: `正常` };
    }
    if (key === "mq135") {
      if (v >= 140) return { level: "bad", msg: `極差 (${v})` };
      if (v >= 110) return { level: "warn", msg: `略高 (${v})` };
      return { level: "good", msg: `正常` };
    }
    if (key === "liquid") {
      if (v === 0) return { level: "bad", msg: `不足` };
      return { level: "good", msg: `充足` };
    }
    // ★ 衛生紙改用 dist (距離 cm)
    if (key === "dist") {
      if (v > 15) return { level: "bad", msg: `已用盡` };
      if (v >= 12) return { level: "warn", msg: `即將用盡` };
      return { level: "good", msg: `充足` };
    }
    return null;
  }

  // 狀態快取
  const statusCache = { "JETSON_NANO_01": { envIndex: "--", sensors: {} }, "JETSON_NANO_02": { envIndex: "--", sensors: {} } };
  let activeTooltipState = null; 

  async function refreshStatus(nodeId) {
    try {
      // ★ 改用新 API: /api/latest
      const res = await fetch(`${API_BASE}/api/latest?node_id=${encodeURIComponent(nodeId)}`, { cache: "no-store" });
      if (!res.ok) return;
      const data = await res.json();
      
      // 後端已計算好分數，直接拿
      const envIndex = data.env_score ?? "--";
      const sensors = data.sensors || {};
      
      statusCache[nodeId] = { envIndex, sensors };
    } catch (e) { }
  }

  async function refreshAllStatus() {
    await Promise.all([refreshStatus("JETSON_NANO_01"), refreshStatus("JETSON_NANO_02")]);
    if (activeTooltipState) {
        updateTooltipContent(activeTooltipState.nodeId, activeTooltipState.title);
    }
  }
  
  refreshAllStatus();
  setInterval(refreshAllStatus, 3000);

  const tooltip = document.getElementById("map-tooltip");
  const mapWrap = document.querySelector(".map-card");

  function updateTooltipContent(nodeId, titleText) {
    if (!tooltip) return;
    const s = statusCache[nodeId] || { sensors: {} };
    
    // 產生標籤 (Badge)
    let alertsHtml = "";
    let hasAlerts = false;
    // 掃描關鍵感測器
    const keys = ["temp", "hum", "mq135", "liquid", "dist"];
    keys.forEach(k => {
      const val = s.sensors[k];
      const res = judgeLevel(k, val);
      if (res && (res.level === 'warn' || res.level === 'bad')) {
        hasAlerts = true;
        alertsHtml += `<div class="t-tag ${res.level}"><span>●</span> ${SENSOR_LABEL[k]} ${res.msg}</div>`;
      }
    });
    if (!hasAlerts) {
      alertsHtml = `<div class="t-tag good"><span>✓</span> 系統運作正常</div>`;
    }

    tooltip.innerHTML = `
      <div class="t-header"><div class="t-title">${titleText}</div><div class="t-icon">● Live</div></div>
      <div class="t-grid">
        <div class="t-stat"><div class="t-stat-val">${s.sensors.temp ?? "--"}<span class="t-unit">°C</span></div><div class="t-stat-label">即時溫度</div></div>
        <div class="t-stat"><div class="t-stat-val" style="color:${getScoreColor(s.envIndex)}">${s.envIndex ?? "--"}</div><div class="t-stat-label">環境指數</div></div>
      </div>
      <div class="t-footer"><div class="t-status-title">即時狀態監控</div><div class="t-tags">${alertsHtml}</div></div>
    `;
  }

  function getScoreColor(score) {
    if (score == "--") return "#0f172a";
    if (score >= 90) return "#059669"; 
    if (score >= 70) return "#ca8a04"; 
    return "#dc2626"; 
  }

  function showTooltip(nodeId, titleText, clientX, clientY) {
    if (!tooltip || !mapWrap) return;
    activeTooltipState = { nodeId, title: titleText };
    updateTooltipContent(nodeId, titleText);
    tooltip.style.display = "block";
    moveTooltip(clientX, clientY);
  }

  function moveTooltip(clientX, clientY) {
    if (!tooltip || !mapWrap) return;
    const rect = mapWrap.getBoundingClientRect();
    const pad = 12;
    let x = clientX - rect.left + 20; 
    let y = clientY - rect.top + 20;
    const maxX = rect.width - tooltip.offsetWidth - pad;
    const maxY = rect.height - tooltip.offsetHeight - pad;
    x = Math.max(pad, Math.min(maxX, x));
    y = Math.max(pad, Math.min(maxY, y));
    tooltip.style.left = `${x}px`;
    tooltip.style.top  = `${y}px`;
  }

  function hideTooltip() {
    if (!tooltip) return;
    activeTooltipState = null;
    tooltip.style.display = "none";
  }

  const r1 = document.getElementById("restroom-1");
  const r2 = document.getElementById("restroom-2");

  function bindHover(el, nodeId, titleText) {
    if (!el) return;
    el.addEventListener("mouseenter", (e) => showTooltip(nodeId, titleText, e.clientX, e.clientY));
    el.addEventListener("mousemove", (e) => moveTooltip(e.clientX, e.clientY));
    el.addEventListener("mouseleave", hideTooltip);
    el.addEventListener("focus", () => showTooltip(nodeId, titleText, mapWrap.getBoundingClientRect().left + 50, mapWrap.getBoundingClientRect().top + 50));
    el.addEventListener("blur", hideTooltip);
  }

  bindHover(r1, "JETSON_NANO_01", "廁所 01 (JETSON_NANO_01)");
  bindHover(r2, "JETSON_NANO_02", "廁所 02 (JETSON_NANO_02)");

  function goNode(nodeId){
    // 儲存選擇並跳轉
    localStorage.setItem("selectedNode", nodeId);
    location.href = `./index.html?node_id=${nodeId}`;
  }

  function bindClick(el, nodeId){
    if (!el) return;
    el.addEventListener("click", () => goNode(nodeId));
    el.addEventListener("touchstart", () => goNode(nodeId), { passive: true });
    el.addEventListener("keydown", (e) => { if (e.key === "Enter") goNode(nodeId); });
  }

  bindClick(r1, "JETSON_NANO_01");
  bindClick(r2, "JETSON_NANO_02");
  </script>
</body>
</html>
