<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>BLE Mesh | 帳號註冊</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { --bg-main: #eef2f6; --bg-panel: #ffffff; --text-main: #1e293b; --primary: #0f172a; }
    body { margin: 0; font-family: 'Segoe UI', system-ui; background: var(--bg-main); display: flex; align-items: center; justify-content: center; height: 100vh; }
    .auth-card { background: var(--bg-panel); width: 100%; max-width: 400px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); text-align: center; }
    .brand { font-size: 32px; font-weight: 800; color: var(--primary); margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; text-align: left; }
    label { display: block; font-size: 14px; font-weight: 600; color: #64748b; margin-bottom: 8px; }
    input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; }
    .btn-submit { width: 100%; padding: 14px; border: none; border-radius: 10px; background: var(--primary); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; }
    .error-msg { color: #ef4444; font-size: 14px; margin-bottom: 16px; display: none; }
    a { color: var(--primary); text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="brand">註冊帳號</div>
    <div id="error-box" class="error-msg"></div>

    <form id="regForm">
      <div class="form-group">
        <label>設定帳號</label>
        <input type="text" id="username" required placeholder="請輸入帳號" />
      </div>
      <div class="form-group">
        <label>設定密碼</label>
        <input type="password" id="password" required placeholder="請輸入密碼" />
      </div>
      <button type="submit" class="btn-submit">確認註冊</button>
    </form>
    <div style="margin-top: 24px; font-size: 14px;">已有帳號？ <a href="login.html">返回登入</a></div>
  </div>

  <script>
    const API_BASE = "http://192.168.0.121:8080";

    document.getElementById("regForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const u = document.getElementById("username").value;
      const p = document.getElementById("password").value;
      const errBox = document.getElementById("error-box");

      if (!u || !p) { errBox.textContent = "❌ 請填寫完整資訊"; errBox.style.display = "block"; return; }

      try {
        const res = await fetch(`${API_BASE}/api/register`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: u, password: p })
        });
        const data = await res.json();

        if (data.ok) {
          alert("註冊成功！請登入");
          location.href = "login.html";
        } else {
          errBox.textContent = "❌ " + (data.error || "註冊失敗");
          errBox.style.display = "block";
        }
      } catch (err) {
        errBox.textContent = "❌ 連線錯誤";
        errBox.style.display = "block";
      }
    });
  </script>
</body>
</html>
